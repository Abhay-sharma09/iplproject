<!DOCTYPE html>
<html>
<head>
    <title>IPL Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏏 IPL Predictor Dashboard</h1>

    <!-- MATCH PREDICTOR -->
    <div class="card">
        <h2>Match Predictor</h2>

        <div class="form-row">

            <div class="input-box">
                <input id="team1" placeholder="Team 1" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

            <div class="input-box">
                <input id="team2" placeholder="Team 2" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

        </div>

        <div class="form-row">

            <div class="input-box">
                <input id="toss_winner" placeholder="Toss Winner" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

            <div class="input-box">
                <input id="toss_decision" placeholder="bat / field" onkeyup="showDecision(this)">
                <span class="dropdown-btn" onclick="toggleDecision(this)">▼</span>
                <div class="suggestions"></div>
            </div>

        </div>

        <button class="btn" id="predictBtn">Predict</button>
        <p id="result"></p>
    </div>

    <!-- TEAM STATS -->
    <div class="card">
        <h2>Team Stats</h2>

        <div class="form-row">

            <div class="input-box">
                <input id="teamStats" placeholder="Team Name" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

            <button class="btn" id="statsBtn">Get Stats</button>

        </div>

        <p id="statsResult"></p>
    </div>

    <!-- TEAM COMPARISON -->
    <div class="card">
        <h2>Team Comparison</h2>

        <div class="form-row">

            <div class="input-box">
                <input id="c1" placeholder="Team 1" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

            <div class="input-box">
                <input id="c2" placeholder="Team 2" onkeyup="showSuggestions(this)">
                <span class="dropdown-btn" onclick="toggleDropdown(this)">▼</span>
                <div class="suggestions"></div>
            </div>

        </div>

        <button class="btn" id="compareBtn">Compare</button>
        <p id="compareResult"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
